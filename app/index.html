<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GARDIAN — Sistema Integrado de Defesa Civil</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#051125",
            "primary-container": "#1B263B",
            "on-primary": "#ffffff",
            "on-primary-container": "#828da7",
            "secondary": "#006A60",
            "on-secondary": "#ffffff",
            "secondary-container": "#8cf5e4",
            "on-secondary-container": "#007166",
            "tertiary-container": "#55000C",
            "error": "#BA1A1A",
            "error-container": "#ffdad6",
            "on-error": "#ffffff",
            "on-error-container": "#93000a",
            "warning": "#C2570B",
            "warning-container": "#ffe0c8",
            "surface": "#f8f9fb",
            "surface-bright": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f2f4f6",
            "surface-container": "#eceef0",
            "surface-container-high": "#e6e8ea",
            "surface-container-highest": "#e0e3e5",
            "on-surface": "#191c1e",
            "on-surface-variant": "#45474d",
            "outline": "#75777d",
            "outline-variant": "#c5c6cd",
            "ink-soft": "#5b6370",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            "md": "0.375rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "2xl": "0.75rem",
            "3xl": "0.75rem",
          },
          fontFamily: {
            headline: ["Public Sans", "sans-serif"],
            body: ["Inter", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"],
          },
          boxShadow: {
            "ambient": "0 30px 60px -20px rgba(5, 17, 37, 0.12), 0 12px 24px -10px rgba(5, 17, 37, 0.06)",
            "ambient-sm": "0 8px 24px -8px rgba(5, 17, 37, 0.08)",
            "critical": "0 0 0 1px rgba(186, 26, 26, 0.20), 0 24px 48px -12px rgba(186, 26, 26, 0.20)",
          }
        }
      }
    };
  </script>

  <style>
    html, body { background: #f8f9fb; color: #191c1e; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-headline { font-family: 'Public Sans', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
    }
    .ms-fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }

    /* Tracking utilities */
    .tracking-mono { letter-spacing: 0.18em; }
    .tracking-mono-tight { letter-spacing: 0.12em; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d8dadc; border-radius: 8px; border: 2px solid #f8f9fb; }
    ::-webkit-scrollbar-thumb:hover { background: #c5c6cd; }

    /* Subtle pulse for live dots */
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }
    .animate-live-dot { animation: pulseDot 1.6s ease-in-out infinite; }

    @keyframes scanline {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    .scanline::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, transparent 0%, rgba(0,106,96,0.08) 50%, transparent 100%);
      height: 30%; animation: scanline 6s ease-in-out infinite;
    }

    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(186,26,26,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(186,26,26,0); }
    }
    .animate-alert-pulse { animation: alertPulse 1.8s ease-out infinite; }

    /* Map placeholder textures */
    .topo-bg {
      background-color: #eef0f2;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(194, 87, 11, 0.18) 0%, transparent 25%),
        radial-gradient(circle at 70% 60%, rgba(186, 26, 26, 0.20) 0%, transparent 22%),
        radial-gradient(circle at 45% 75%, rgba(0, 106, 96, 0.12) 0%, transparent 28%),
        repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 18px, rgba(91, 99, 112, 0.08) 18px, rgba(91, 99, 112, 0.08) 19px);
    }
    .radar-bg {
      background:
        radial-gradient(circle at 50% 50%, rgba(0,106,96,0.18) 0%, transparent 60%),
        repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 30px, rgba(140, 245, 228, 0.08) 30px, rgba(140, 245, 228, 0.08) 31px),
        linear-gradient(135deg, #051125 0%, #0a1a33 50%, #1B263B 100%);
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(91,99,112,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,99,112,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Tonal cards never use 1px solid borders */
    .card-tonal { background: #ffffff; border-radius: 0.75rem; }
    .card-recessed { background: #f2f4f6; border-radius: 0.75rem; }

    /* No focus ring everywhere except inputs */
    button:focus { outline: none; }
    button:focus-visible { outline: 2px solid #006A60; outline-offset: 2px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
